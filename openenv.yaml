name: neural-paged-attention
version: "1.0.0"
description: >
  A high-fidelity RL environment simulating GPU KV Cache management
  for LLM inference servers. The agent learns to schedule, evict,
  swap, and preempt requests to maximise throughput while honouring
  VIP SLA constraints under chaotic traffic.
author: "Team Neural PagedAttention"
tasks:
  - easy
  - medium
  - hard
observation_space:
  type: array
  shape: [20]
  dtype: float32
  range: [-1.0, 1.0]
action_space:
  type: discrete
  n: 18
reward_range: [-100.0, 3.0]
