openapi: 3.1.0
info:
  title: Neural PagedAttention Backend API
  version: 0.1.0
paths:
  /api/agents:
    get:
      tags:
      - simulation
      summary: List available agents
      description: Returns a list of all supported reinforcement learning and heuristic agents, along with instructions on how to use them.
      operationId: get_agents_api_agents_get
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema: {}
  /api/settings:
    get:
      tags:
      - configuration
      summary: Get environment constants
      description: Returns the current dynamic environment constants and their original default values.
      operationId: get_settings_api_settings_get
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema: {}
    post:
      tags:
      - configuration
      summary: Update environment constants
      description: Update GPU_TOTAL_BLOCKS, CPU_TOTAL_BLOCKS, TOKENS_PER_BLOCK, max_queue_size, and max_ticks for tasks.
      operationId: update_settings_api_settings_post
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SettingsRequest'
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema: {}
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /api/simulate:
    post:
      tags:
      - simulation
      summary: Run a full batch simulation
      description: Triggers a headless background simulation of the Neural PagedAttention environment using the specified agent policy.
      operationId: run_simulation_endpoint_api_simulate_post
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SimulationRequest'
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema: {}
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /api/simulate-all:
    post:
      tags:
      - simulation
      summary: Run all agents and tasks with shared seeded traffic
      description: Applies runtime configuration, generates one deterministic traffic trace per task from the provided seed, runs every selected agent, and returns combined tick and session telemetry.
      operationId: run_all_simulations_api_simulate_all_post
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/BatchSimulationRequest'
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BatchSimulationResponse'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /reset:
    post:
      tags:
      - legacy
      summary: '[DEPRECATED] Reset global env'
      description: '**Deprecated.** Use ``POST /sessions/{session_id}/reset`` instead.'
      operationId: legacy_reset_reset_post
      requestBody:
        required: false
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/_LegacyResetRequest'
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema: {}
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
      deprecated: true
  /step:
    post:
      tags:
      - legacy
      summary: '[DEPRECATED] Step global env'
      description: '**Deprecated.** Use ``POST /sessions/{session_id}/step`` instead.'
      operationId: legacy_step_step_post
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/_LegacyStepRequest'
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema: {}
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
      deprecated: true
  /state:
    get:
      tags:
      - legacy
      summary: '[DEPRECATED] Get global env state'
      description: '**Deprecated.** Use ``GET /sessions/{session_id}/state`` instead.'
      operationId: legacy_state_state_get
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema: {}
      deprecated: true
components:
  schemas:
    HTTPValidationError:
      type: object
      title: HTTPValidationError
      properties:
        detail:
          type: array
          title: Detail
          items:
            $ref: '#/components/schemas/ValidationError'
    SettingsRequest:
      type: object
      title: SettingsRequest
      properties:
        gpu_total_blocks:
          anyOf:
          - type: integer
          - type: 'null'
        cpu_total_blocks:
          anyOf:
          - type: integer
          - type: 'null'
        tokens_per_block:
          anyOf:
          - type: integer
          - type: 'null'
        max_queue_size:
          anyOf:
          - type: integer
          - type: 'null'
        max_ticks_easy:
          anyOf:
          - type: integer
          - type: 'null'
        max_ticks_medium:
          anyOf:
          - type: integer
          - type: 'null'
        max_ticks_hard:
          anyOf:
          - type: integer
          - type: 'null'
    BatchSimulationRequest:
      type: object
      title: BatchSimulationRequest
      required:
      - seed
      properties:
        gpu_total_blocks:
          anyOf:
          - type: integer
          - type: 'null'
        cpu_total_blocks:
          anyOf:
          - type: integer
          - type: 'null'
        tokens_per_block:
          anyOf:
          - type: integer
          - type: 'null'
        max_queue_size:
          anyOf:
          - type: integer
          - type: 'null'
        max_ticks_easy:
          anyOf:
          - type: integer
          - type: 'null'
        max_ticks_medium:
          anyOf:
          - type: integer
          - type: 'null'
        max_ticks_hard:
          anyOf:
          - type: integer
          - type: 'null'
        seed:
          type: integer
          minimum: 0
        agents:
          anyOf:
          - type: array
            items:
              type: string
          - type: 'null'
        tasks:
          anyOf:
          - type: array
            items:
              type: string
              enum:
              - easy
              - medium
              - hard
          - type: 'null'
        include_tick_logs:
          type: boolean
          default: true
    BatchSimulationResponse:
      type: object
      title: BatchSimulationResponse
      required:
      - status
      - seed
      - applied_config
      - tasks
      - agents
      - all_session_logs
      properties:
        status:
          type: string
        seed:
          type: integer
        applied_config:
          type: object
          additionalProperties: true
        tasks:
          type: array
          items:
            type: string
        agents:
          type: array
          items:
            type: string
        results_by_task:
          type: object
          additionalProperties: true
        all_session_logs:
          type: array
          items:
            $ref: '#/components/schemas/SimulationRunSummary'
        all_tick_logs:
          type: array
          items:
            type: object
            additionalProperties: true
    SimulationRunSummary:
      type: object
      title: SimulationRunSummary
      required:
      - agent
      - task
      - session_id
      - ticks_run
      - total_reward
      - final_score
      - total_arrived
      - total_completed
      - crashed
      properties:
        agent:
          type: string
        task:
          type: string
        session_id:
          type: string
        ticks_run:
          type: integer
        total_reward:
          type: number
        final_score:
          type: number
        total_arrived:
          type: integer
        total_completed:
          type: integer
        crashed:
          type: boolean
    SimulationRequest:
      type: object
      title: SimulationRequest
      required:
      - agent
      properties:
        agent:
          type: string
          description: The name of the agent to run. Must be either 'lru', 'random', 'qlearning', 'neural', or 'llm'.
        task:
          anyOf:
          - type: string
          - type: 'null'
        ticks:
          anyOf:
          - type: integer
          - type: 'null'
    ValidationError:
      type: object
      title: ValidationError
      required:
      - loc
      - msg
      - type
      properties:
        loc:
          type: array
          items:
            anyOf:
            - type: string
            - type: integer
        msg:
          type: string
        type:
          type: string
        input:
          title: Input
        ctx:
          type: object
          title: Context
    _LegacyResetRequest:
      type: object
      title: _LegacyResetRequest
      properties:
        task:
          anyOf:
          - type: string
          - type: 'null'
          default: easy
    _LegacyStepRequest:
      type: object
      title: _LegacyStepRequest
      properties:
        action:
          anyOf:
          - type: integer
          - type: 'null'
        action_id:
          anyOf:
          - type: integer
          - type: 'null'
