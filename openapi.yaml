openapi: 3.1.0
info:
  title: Neural PagedAttention Backend API
  version: 0.1.0
paths:
  /api/simulate:
    post:
      tags:
      - simulation
      summary: Run a full batch simulation
      description: "Triggers a headless background simulation of the Neural PagedAttention\
        \ environment using the specified agent policy.\n    \n    This endpoint executes\
        \ the entire episode(s) and returns a comprehensive telemetry package containing:\n\
        \    - `session_logs`: High-level episodic summaries including normalized\
        \ scores and crash flags.\n    - `tick_logs`: Granular, tick-by-tick telemetry\
        \ including rewards, actions, and 20-dimensional observation vectors.\n  \
        \  \n    Multiple simulations can be requested concurrently without interference."
      operationId: run_simulation_endpoint_api_simulate_post
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SimulationRequest'
        required: true
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema: {}
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /reset:
    post:
      tags:
      - legacy
      summary: '[DEPRECATED] Reset global env'
      description: '**Deprecated.** Use ``POST /sessions/{session_id}/reset`` instead.'
      operationId: legacy_reset_reset_post
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/_LegacyResetRequest'
              default:
                task: easy
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema: {}
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
      deprecated: true
  /step:
    post:
      tags:
      - legacy
      summary: '[DEPRECATED] Step global env'
      description: '**Deprecated.** Use ``POST /sessions/{session_id}/step`` instead.'
      operationId: legacy_step_step_post
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/_LegacyStepRequest'
        required: true
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema: {}
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
      deprecated: true
  /state:
    get:
      tags:
      - legacy
      summary: '[DEPRECATED] Get global env state'
      description: '**Deprecated.** Use ``GET /sessions/{session_id}/state`` instead.'
      operationId: legacy_state_state_get
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema: {}
      deprecated: true
components:
  schemas:
    HTTPValidationError:
      properties:
        detail:
          items:
            $ref: '#/components/schemas/ValidationError'
          type: array
          title: Detail
      type: object
      title: HTTPValidationError
    SimulationRequest:
      properties:
        agent:
          type: string
          title: Agent
          description: The name of the agent to run. Must be either 'lru' or 'random'.
        task:
          anyOf:
          - type: string
          - type: 'null'
          title: Task
          description: 'The task difficulty to simulate. Options: ''easy'', ''medium'',
            ''hard''. If omitted, all tasks will be run sequentially.'
      type: object
      required:
      - agent
      title: SimulationRequest
    ValidationError:
      properties:
        loc:
          items:
            anyOf:
            - type: string
            - type: integer
          type: array
          title: Location
        msg:
          type: string
          title: Message
        type:
          type: string
          title: Error Type
        input:
          title: Input
        ctx:
          type: object
          title: Context
      type: object
      required:
      - loc
      - msg
      - type
      title: ValidationError
    _LegacyResetRequest:
      properties:
        task:
          anyOf:
          - type: string
          - type: 'null'
          title: Task
          default: easy
      type: object
      title: _LegacyResetRequest
    _LegacyStepRequest:
      properties:
        action:
          anyOf:
          - type: integer
          - type: 'null'
          title: Action
        action_id:
          anyOf:
          - type: integer
          - type: 'null'
          title: Action Id
      type: object
      title: _LegacyStepRequest
